global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'tenantcore'

scrape_configs:
  - job_name: 'tenantcore-api'
    static_configs:
      - targets: ['api:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'tenantcore-workers'
    static_configs:
      - targets: ['workers:3001']
    metrics_path: '/metrics'

  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongo:27017']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
