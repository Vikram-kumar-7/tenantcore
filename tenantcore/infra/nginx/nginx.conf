worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time tenant=$http_x_tenant_slug';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Upstream definitions
    upstream api_upstream {
        least_conn;
        server api:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream dashboard_upstream {
        server dashboard:80;
        keepalive 8;
    }

    # ── Edge rate limiting (first line of defense) ────────────────────────────
    limit_req_zone $binary_remote_addr zone=global_limit:16m rate=200r/m;
    limit_req_zone $http_x_tenant_slug zone=tenant_limit:32m rate=1000r/m;
    limit_req_status 429;

    # ── Admin Dashboard ───────────────────────────────────────────────────────
    server {
        listen 80;
        server_name admin.tenantcore.com;

        location / {
            proxy_pass http://dashboard_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ── Per-tenant API routing via subdomain ──────────────────────────────────
    # Matches: {tenant-slug}.tenantcore.com → extracts slug → sends to API
    server {
        listen 80;
        server_name ~^(?<tenant_slug>[a-z0-9][a-z0-9\-]{1,61}[a-z0-9])\.tenantcore\.com$;

        client_max_body_size 512m;
        client_body_buffer_size 128k;

        # Edge rate limiting
        limit_req zone=tenant_limit burst=50 nodelay;

        location /api/ {
            # Inject tenant slug from subdomain for app-level resolution
            proxy_set_header X-Tenant-Slug $tenant_slug;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            proxy_http_version 1.1;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_pass http://api_upstream;
        }

        # WebSocket upgrade for Socket.io
        location /socket.io/ {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Tenant-Slug $tenant_slug;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }
    }

    # ── Platform API (no subdomain) ───────────────────────────────────────────
    server {
        listen 80;
        server_name api.tenantcore.com;

        location /api/ {
            limit_req zone=global_limit burst=20 nodelay;
            proxy_pass http://api_upstream;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Health/metrics (no rate limit)
        location ~ ^/(health|readiness|liveness|metrics)$ {
            proxy_pass http://api_upstream;
        }
    }
}
